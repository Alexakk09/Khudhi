<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Forgive Me? 🥺</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ffe4ec;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.hearts span{
    position:absolute;
    color:#ff7aa5;
    opacity:.25;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-100px);
    }
}

.card{
    width:92%;
    max-width:520px;
    background:white;
    padding:45px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,77,136,.15);
    z-index:10;
}

.photo{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

h1{
    color:#ff4d88;
    margin-bottom:10px;
    font-size:48px;
}

p{
    color:#777;
    margin-bottom:25px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    border-radius:14px;
    padding:14px 26px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

#yesBtn{
    background:#ff4d88;
    color:white;
}

#noBtn{
    background:white;
    color:#444;
    border:2px solid #eee;
    padding:16px 50px;
    font-size:20px;
    font-weight:600;
}

.message{
    margin-top:18px;
    color:#888;
    min-height:25px;
}

.success{
    text-align:center;
}

.success img{
    width:340px;
    height:340px;
    object-fit:cover;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.success h1{
    margin-top:20px;
    font-size:4rem;
}

.success p{
    font-size:1.2rem;
}

</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<img id="mainPhoto" class="photo" src="photo1.jpg" alt="">

<h1>Will You Forgive Me? 🥺</h1>

<p>Choose carefully.</p>

<div class="buttons">
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😭</button>
</div>

<div class="message" id="message"></div>

</div>

<script>

// Floating hearts

const hearts = document.getElementById("hearts");

for(let i=0;i<30;i++){

    const heart=document.createElement("span");

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"%";
    heart.style.fontSize=(12+Math.random()*20)+"px";
    heart.style.animationDuration=(8+Math.random()*10)+"s";
    heart.style.animationDelay=Math.random()*8+"s";

    hearts.appendChild(heart);
}

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const message=document.getElementById("message");
const mainPhoto=document.getElementById("mainPhoto");

let count=0;
let scale=1;

const texts=[
    "Are you sure? 🥺",
    "Really? 😭",
    "itna gussa ho? 😔",
    "Think again 😔",
    "Please? 🥹",
    "Pretty please? 🥺",
    
];

const photos=[
    "photo1.jpg",
    "photo2.jpg",
    "photo3.jpg"
];

noBtn.addEventListener("click",()=>{

    count++;

    scale += 0.25;
    yesBtn.style.transform=`scale(${scale})`;

    if(count <= texts.length){
        message.textContent=texts[count-1];
    }

    if(count <= photos.length){
        mainPhoto.src=photos[count-1];
    }

    if(count >= 2){

        noBtn.style.position="fixed";

        const x=Math.random()*(window.innerWidth-140);
        const y=Math.random()*(window.innerHeight-80);

        noBtn.style.left=x+"px";
        noBtn.style.top=y+"px";
    }
});

yesBtn.addEventListener("click",()=>{

document.body.innerHTML=`

<div class="success">

<img src="success.jpg">

<h1>YAYYY ❤️</h1>

<p>
Thank you !! You make me so happy 😭❤️
</p>

<p style="
margin-top:8px;
font-size:32px;
font-weight:700;
color:#ff4d88;
">
Meri Pyaari Khushi 🌷❤️
</p>

</div>

`;

});

</script>

</body>
</html>
