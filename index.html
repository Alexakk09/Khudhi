<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#ffd6e7,#ffeaf3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:450px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

h1{
    color:#ff4d88;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.gif{
    width:220px;
    border-radius:15px;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d88;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

.success{
    text-align:center;
}

.success h1{
    font-size:3rem;
}

.success p{
    font-size:1.3rem;
}
</style>
</head>
<body>

<div class="card" id="card">

<img
class="gif"
src="https://media.tenor.com/5VxM4JY6A9EAAAAi/love-bear.gif"
alt="cute bear">

<h1>Will You Be My Girlfriend? ❤️</h1>

<p>You only have one correct answer 😌</p>

<div class="buttons">
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 😭</button>
</div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let noCount = 0;
let scale = 1;

noBtn.addEventListener("click", () => {

    noCount++;

    scale += 0.3;
    yesBtn.style.transform = `scale(${scale})`;

    const texts = [
        "No 😭",
        "Are you sure? 🥺",
        "Really sure? 😢",
        "Think again 😭",
        "Please? 🥹",
        "Last chance 😔"
    ];

    if(noCount < texts.length){
        noBtn.innerText = texts[noCount];
    }

    if(noCount >= 2){
        noBtn.style.position = "fixed";

        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 80);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
});

yesBtn.addEventListener("click", () => {

document.body.innerHTML = `
<div class="success">

<img
src="https://media.tenor.com/0AVbKGY_MxMAAAAi/love.gif"
width="250">

<h1>YAYYY ❤️🎉</h1>

<p>
You just made me the happiest person alive 💕
</p>

</div>
`;

});

</script>

</body>
</html>
